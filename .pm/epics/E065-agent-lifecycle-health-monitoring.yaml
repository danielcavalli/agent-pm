id: E065
code: PM-E065
title: Agent Lifecycle & Health Monitoring
description: >-
  Add heartbeat staleness detection, agent process tracking, and the ability to kill misbehaving agents from the TUI.
  Transforms the TUI from a passive observer into an active supervisor. Addresses the gap between dispatch (which
  exists) and full lifecycle management (which does not).
status: backlog
priority: high
created_at: '2026-03-16'
stories:
  - id: S001
    code: PM-E065-S001
    title: Heartbeat staleness detection
    description: >-
      Add a stale_threshold_seconds config option to project.yaml (default: 60). In the TUI render, compare Date.now()
      to agent.last_heartbeat; if delta exceeds threshold, mark the agent as stale. Show stale agents with a distinct
      icon (hourglass) and dim yellow color in the sidebar.
    acceptance_criteria:
      - An agent whose last heartbeat is >60s ago shows a stale indicator in the sidebar
      - Stale agents have a distinct icon (hourglass) and color (dim yellow)
      - Threshold is configurable via stale_threshold_seconds in project.yaml
      - Default threshold is 60 seconds when not configured
      - Stale detection updates on each file watcher reload cycle
    status: done
    priority: high
    story_points: 3
    depends_on: []
    notes: ''
  - id: S002
    code: PM-E065-S002
    title: Track spawned agent PIDs
    description: >-
      When dispatching an agent via dispatch.ts (x key), record the spawned PID and metadata in
      .pm/agents/{id}-process.yaml. Define a schema with pid, spawned_at, command, and method (tmux/background) fields.
    acceptance_criteria:
      - After x dispatch, a process YAML file is created at .pm/agents/{id}-process.yaml
      - Process file contains pid, spawned_at timestamp, command string, and method
      - Schema is validated with Zod
      - Process file is only created for agents dispatched from the TUI
    status: done
    priority: high
    story_points: 2
    depends_on: []
    notes: ''
  - id: S003
    code: PM-E065-S003
    title: Agent process liveness check
    description: >-
      Periodically (on file watcher reload tick), check if tracked agent PIDs are still alive via process.kill(pid, 0).
      If a PID is dead but the agent status is still active, show a crashed indicator in the sidebar with a distinct
      icon and color.
    acceptance_criteria:
      - A crashed agent (dead PID, active status) shows a distinct crash indicator icon
      - Liveness check runs on each file watcher reload cycle
      - Agents without a tracked PID (externally registered) are not checked
      - process.kill(pid, 0) errors are caught gracefully (ESRCH = dead, EPERM = alive)
    status: done
    priority: high
    story_points: 3
    depends_on:
      - PM-E065-S002
    notes: ''
  - id: S004
    code: PM-E065-S004
    title: Kill agent from TUI (K key)
    description: >-
      When the sidebar is focused on an agent with a tracked PID, pressing K sends SIGTERM to the process. Show a
      confirmation prompt before killing. Handle the case where the process is already dead gracefully.
    acceptance_criteria:
      - 'Pressing K on an agent with a tracked PID shows confirmation: Kill agent {id}? [y/n]'
      - On confirm, SIGTERM is sent to the tracked PID
      - Success message shown after kill
      - If PID is already dead, shows appropriate message instead of error
      - K is a no-op for agents without tracked PIDs
      - Help overlay updated with K keybinding
    status: done
    priority: medium
    story_points: 3
    depends_on:
      - PM-E065-S002
    notes: ''
  - id: S005
    code: PM-E065-S005
    title: Agent timeline in detail panel
    description: >-
      When viewing an agent in the detail panel, show a chronological timeline of events: started, heartbeats,
      escalations, responses, completed/crashed. Build the timeline from started_at, last_heartbeat, and escalation log
      data (once E067 is implemented, use that; until then, show available data).
    acceptance_criteria:
      - Agent detail panel shows a timeline section with chronological events
      - Timeline shows started_at as the first event
      - Timeline shows last_heartbeat with relative time
      - If agent has escalation, it appears in the timeline
      - If agent is completed or crashed, terminal event is shown
      - Timeline is scrollable within the detail panel
    status: done
    priority: medium
    story_points: 5
    depends_on:
      - PM-E065-S001
    notes: ''
  - id: S006
    code: PM-E065-S006
    title: Investigate missing completed agents in TUI after parallel orchestration
    description: >-
      During /pm-work-on-project execution, multiple sub-agents completed stories successfully, but the TUI Agents tab
      only reflected a small subset of those completed agents. Investigate whether the gap is caused by agent-state
      persistence, sidebar filtering, file-watcher refresh timing, completed-agent retention, or another
      lifecycle/display mismatch, and capture the root cause plus a recommended fix path.
    acceptance_criteria:
      - Reproduce the mismatch between orchestrator logs and TUI agent counts using a controlled multi-agent run
      - Identify the code path or state transition responsible for completed agents not appearing in the TUI
      - Document the root cause and recommended remediation in an execution report or agent comment
      - >-
        If the investigation does not include the fix itself, file a follow-up implementation story with clear
        acceptance criteria
    status: done
    priority: high
    story_points: 3
    depends_on: []
    notes: ''
  - id: S007
    code: PM-E065-S007
    title: Investigate agent sidebar reset behavior when orchestration resumes
    description: >-
      The TUI agent sidebar appears to reset after pausing and resuming orchestration. Investigate whether agent state
      is expected to persist across orchestrator restarts, and determine whether the reset comes from state cleanup,
      reload semantics, process tracking, or UI-layer assumptions.
    acceptance_criteria:
      - Reproduce the sidebar reset behavior across an orchestrator pause/resume cycle
      - Determine whether the current behavior matches intended lifecycle semantics or is a regression
      - Document the root cause and the expected persistence contract for the Agents tab
      - If a fix is needed but not implemented in the investigation, file a follow-up implementation story
    status: done
    priority: high
    story_points: 2
    depends_on: []
    notes: ''
  - id: S008
    code: PM-E065-S008
    title: Prevent parallel worker agent-state collisions in TUI observer model
    description: >-
      Parallel orchestrated workers can currently reuse a shared agent_id (for example `opencode-agent`), and `pm agent
      heartbeat` stores state at `.pm/agents/{agent_id}.yaml`. That causes later heartbeats to overwrite earlier
      workers, so the TUI only sees the last writer and completed-agent counts are understated. Implement a durable
      identity strategy or persistence layout that preserves distinct concurrent/completed workers and keeps
      session/task metadata internally consistent for the TUI.
    acceptance_criteria:
      - >-
        A controlled reproduction with two completed workers that currently collapses to one `.pm/agents` record is
        added as an automated regression test
      - >-
        Parallel workers with distinct sessions but a shared base agent identity are persisted as distinct observed
        agents instead of overwriting each other
      - The TUI agent list/count reflects both completed workers in the controlled reproduction
      - Existing single-agent heartbeat flows remain supported and documented, including how worker identity is derived
    status: done
    priority: high
    story_points: 3
    depends_on:
      - PM-E065-S006
    notes: ''

id: E021
code: PM-E021
title: PM MCP Server — Universal Tool Interface
description: >-
  Build a TypeScript MCP (Model Context Protocol) server that exposes pm_epic_add, pm_story_add, and pm_status as MCP
  tools — the single universal tool interface for both OpenCode and Claude Code. This replaces the @opencode-ai/plugin
  custom tools layer (install/opencode/tools/pm.ts) with a standard protocol that works identically in both clients.
  The server uses @modelcontextprotocol/sdk, wraps the pm CLI via Node child_process, is compiled to
  dist/pm-mcp-server.js as part of the existing npm run build step, and is registered with each client during install
  (OpenCode via opencode.json mcp config, Claude Code via claude mcp add --scope user).
status: done
priority: high
created_at: "2026-03-10"
stories:
  - id: S001
    code: PM-E021-S001
    title: Add @modelcontextprotocol/sdk dependency
    description: >-
      Install @modelcontextprotocol/sdk as a production dependency. This is the official MCP TypeScript SDK, currently
      at v1.27.1 on npm. No MCP server code can be compiled or type-checked without it, making this the prerequisite for
      all other stories in the epic.
    acceptance_criteria:
      - package.json lists @modelcontextprotocol/sdk under dependencies
      - package-lock.json is updated with the locked version
      - npm run build still succeeds after the package is added
      - import { Server } from "@modelcontextprotocol/sdk/server/index.js" resolves without TypeScript errors
    status: done
    priority: high
    story_points: 1
    notes: ""
  - id: S002
    code: PM-E021-S002
    title: Implement src/mcp-server.ts with all three tools
    description: >-
      Create src/mcp-server.ts — the MCP server entry point. It uses Server and StdioServerTransport from
      @modelcontextprotocol/sdk to handle MCP stdio protocol messages. Three tools are exposed: pm_status, pm_epic_add,
      and pm_story_add. Each tool invokes the pm CLI via Node's child_process.spawnSync, mirroring the structure and
      tool descriptions from install/opencode/tools/pm.ts. Input validation is handled by MCP inputSchema JSON Schema
      definitions.
    acceptance_criteria:
      - "src/mcp-server.ts exists and starts with #!/usr/bin/env node"
      - ListToolsRequestSchema handler returns all three tools with correct name, description, and inputSchema fields
      - CallToolRequestSchema handler dispatches to pm CLI via child_process.spawnSync for each tool
      - Tool descriptions are semantically identical to the guidance strings in install/opencode/tools/pm.ts
      - CLI errors (non-zero exit) are returned as MCP tool error responses, not uncaught exceptions
    status: done
    priority: high
    story_points: 3
    notes: ""
  - id: S003
    code: PM-E021-S003
    title: Integrate MCP server into build and verify executable output
    description: >-
      Confirm npm run build (plain tsc) produces dist/mcp-server.js from src/mcp-server.ts without any tsconfig
      changes. Verify the shebang is preserved in the compiled output and the file is chmod'd executable. This is the
      artifact that E022's install-claude.sh will register via claude mcp add.
    acceptance_criteria:
      - npm run build completes without errors and produces dist/mcp-server.js
      - "head -1 dist/mcp-server.js outputs #!/usr/bin/env node"
      - chmod +x dist/mcp-server.js && ./dist/mcp-server.js starts the server without crashing (blocks on stdin)
      - No modifications to tsconfig.json are required (file is covered by src/**/*)
    status: done
    priority: high
    story_points: 1
    notes: ""
  - id: S004
    code: PM-E021-S004
    title: Validate all three tools end-to-end via MCP stdio
    description: >-
      Send real MCP JSON-RPC requests to the running server over stdio and verify correct responses. This validates the
      full Claude Code integration path: tool discovery, argument parsing, CLI invocation, and response formatting.
      Testing can be done with the @modelcontextprotocol/sdk client or by piping JSON-RPC messages directly to the
      server's stdin.
    acceptance_criteria:
      - A tools/list request returns all three tool definitions with pm_status, pm_epic_add, and pm_story_add names
      - A tools/call for pm_status returns output matching pm status CLI output
      - A tools/call for pm_epic_add with a test project code creates an epic (verifiable via pm epic list)
      - A tools/call for pm_story_add with a test epic code creates a story (verifiable in the epic YAML)
    status: done
    priority: medium
    story_points: 2
    notes: ""

      - src/schemas/adr.schema.ts imports TaskReferenceSchema from ./comment.schema.js or from ./index.js
      - TaskReferenceSchema is re-exported from src/schemas/index.ts
      - The duplicate definition in adr.schema.ts is deleted
      - All existing tests pass with no schema validation changes
    status: done
    priority: medium
    story_points: 1
    depends_on: []
    notes: ''

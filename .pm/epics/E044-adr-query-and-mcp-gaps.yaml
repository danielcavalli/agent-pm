id: E044
code: PM-E044
title: ADR Query and MCP Gaps
description: >-
  Fix E032 PARTIAL — pm adr query lacks relevance ranking, MCP exposure, and sensible defaults. Add scoring by tag match
  count + recency, register pm_adr_query as MCP tool, default-exclude superseded/deprecated ADRs, and fix limit
  defaults.
status: backlog
priority: high
created_at: '2026-03-11'
stories:
  - id: S001
    code: PM-E044-S001
    title: Add relevance ranking to pm adr query
    description: >-
      Score results by tag match count plus recency. Return results sorted by relevance score instead of insertion
      order.
    acceptance_criteria:
      - Results are scored by number of matching tags
      - Recency is factored into the score (newer ADRs score higher)
      - Results are returned sorted by score descending
      - Score is visible in output (at least in verbose mode)
    status: backlog
    priority: high
    story_points: 3
    depends_on: []
    notes: ''
  - id: S002
    code: PM-E044-S002
    title: Register pm_adr_query as MCP tool
    description: Add pm_adr_query to the MCP server in mcp-server.ts so agents can call it programmatically.
    acceptance_criteria:
      - pm_adr_query is registered in the MCP server tools/list response
      - Tool schema includes all filter parameters (status, tags, domain, author, limit)
      - Tool delegates to pm adr query CLI command
      - Error responses follow existing MCP tool error patterns
    status: backlog
    priority: high
    story_points: 2
    depends_on: []
    notes: ''
  - id: S003
    code: PM-E044-S003
    title: Default-exclude superseded and deprecated ADRs
    description: >-
      By default, pm adr query excludes superseded and deprecated ADRs. Add --include-superseded flag to opt in to
      seeing them.
    acceptance_criteria:
      - Default query results exclude ADRs with status superseded or deprecated
      - '--include-superseded flag shows all ADRs regardless of status'
      - Behavior is documented in --help output
      - MCP tool parameter mirrors the flag
    status: backlog
    priority: medium
    story_points: 2
    depends_on: []
    notes: ''
  - id: S004
    code: PM-E044-S004
    title: Fix query defaults and add summary format
    description: Change default --limit from 20 to 5. Add summary format with one-sentence decision excerpt per ADR.
    acceptance_criteria:
      - Default --limit is 5, not 20
      - Summary format shows ADR ID, title, status, and one-sentence decision excerpt
      - Full format (--format full) still shows complete ADR content
      - Limit can be overridden via --limit flag
    status: backlog
    priority: low
    story_points: 2
    depends_on: []
    notes: ''

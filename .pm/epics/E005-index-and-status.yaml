id: E005
code: PM-E005
title: Index & Status Reporting
description: >
  Implement automatic index maintenance and the status reporting command.
  The index.yaml must always reflect accurate story counts. The status
  command must produce output that is useful to both humans and AI agents.
status: done
priority: medium
created_at: "2026-03-09"
stories:
  - id: S001
    code: PM-E005-S001
    title: Implement index auto-maintenance
    description: >
      Create src/lib/index.ts with a rebuildIndex(projectCode?) function that
      scans the projects/ directory, reads all project.yaml and epic yaml files,
      and rewrites projects/index.yaml with accurate counts. This should be
      called automatically after every mutating CLI command (init, epic add,
      story add, story update).
    acceptance_criteria:
      - rebuildIndex() regenerates index.yaml from filesystem state
      - index.yaml counts match actual story counts after story add/update
      - Calling rebuildIndex on an empty projects/ creates a valid empty index
      - index.yaml is updated after pm init, pm epic add, pm story add, pm story update
    status: done
    priority: medium
    story_points: 3
    notes: ""

  - id: S002
    code: PM-E005-S002
    title: Polish status command output for agent consumption
    description: >
      Enhance the pm status output to include: a progress bar per epic (done/total),
      a "next recommended story" suggestion (highest priority backlog story), and
      a machine-readable JSON mode via --json flag. The JSON output should be
      the full index structure plus each epic's stories.
    acceptance_criteria:
      - pm status shows progress bar per epic
      - 'pm status shows "Next: PM-E001-S002 — Title" recommendation'
      - pm status --json outputs valid parseable JSON
      - JSON output includes all project, epic, and story fields
    status: done
    priority: low
    story_points: 3
    notes: ""

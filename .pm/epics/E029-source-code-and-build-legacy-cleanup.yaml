id: E029
code: PM-E029
title: Source Code and Build Legacy Cleanup
description: >-
  Minor source code and build cleanup for v1 vestiges. The PROJECTS_DIR env var fallback in codes.ts is an undocumented
  v1 test mechanism that should be removed (PRD only defines PM_HOME and ~/.pm/). The TypeScript build compiles test
  files into dist/ unnecessarily. Low priority -- these are tech debt items that don't block functionality but should be
  cleaned up for alpha release hygiene.
status: done
priority: low
created_at: '2026-03-10'
stories:
  - id: S001
    code: PM-E029-S001
    title: Remove PROJECTS_DIR env var fallback and update tests
    description: >-
      Remove the undocumented PROJECTS_DIR env var fallback from src/lib/codes.ts lines 16-17. The PRD only defines two
      resolution options: PM_HOME env var and ~/.pm/ default. Update getProjectsDir() docstring (line 9) to remove
      PROJECTS_DIR mention. Update all test files that save/clear/restore PROJECTS_DIR:
      src/__tests__/integration-helpers.ts, src/tui/__tests__/loadTree.test.ts, src/lib/__tests__/codes.test.ts. All
      tests already use PM_HOME but defensively clean up PROJECTS_DIR -- remove those defensive cleanups.
    acceptance_criteria:
      - PROJECTS_DIR env var fallback is removed from src/lib/codes.ts getProjectsDir()
      - 'getProjectsDir() resolution chain is: PM_HOME > ~/.pm/ (only two options)'
      - All test files updated to use PM_HOME exclusively
      - No test file references PROJECTS_DIR
      - All existing tests pass after the change
    status: done
    priority: low
    story_points: 2
    notes: ''
  - id: S002
    code: PM-E029-S002
    title: Exclude test files from dist/ build output
    description: >-
      The current tsconfig.json compiles all TypeScript files including test files into dist/, producing unnecessary
      dist/__tests__/, dist/commands/__tests__/, dist/lib/__tests__/, and dist/tui/__tests__/ directories. Add an
      exclude pattern to tsconfig.json to skip test files during build. Verify vitest.config.ts still picks up tests
      correctly (it has its own include pattern).
    acceptance_criteria:
      - tsconfig.json excludes **/__tests__/** or equivalent pattern
      - >-
        Running npm run build no longer produces files under dist/__tests__/, dist/commands/__tests__/,
        dist/lib/__tests__/, dist/tui/__tests__/
      - dist/ only contains runtime source files
      - All production functionality still works after the change
    status: done
    priority: low
    story_points: 1
    notes: ''

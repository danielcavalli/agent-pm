id: E057
code: PM-E057
title: SwarmStore Foundation
description: >-
  Define the SwarmStore interface, implement FileSwarmStore for YAML-based persistence, initialize the .pm/swarm/
  directory structure, and provide the pm swarm init CLI command. This is the data layer for all swarm coordination.
status: backlog
priority: high
created_at: '2026-03-15'
stories:
  - id: S001
    code: PM-E057-S001
    title: Define SwarmStore interface and core Zod schemas
    description: >-
      Create src/schemas/swarm-store.schema.ts defining Zod schemas for all SwarmStore data types: TacticsSchema,
      StrategySchema, ObservationRecordSchema, ExperimentResultSchema, ClaimSchema, HypothesisSchema, InsightSchema,
      BestMetadataSchema. Define the TypeScript SwarmStore interface in src/lib/swarm-store.ts matching ADR-023 Decision
      3. Re-export all schemas from src/schemas/index.ts.
    acceptance_criteria:
      - >-
        src/schemas/swarm-store.schema.ts exports TacticsSchema validating the full structure from ADR-023 Decision 1
        (version, tactics array with name/description/metric/direction/weight/measurement/source, profiles object)
      - >-
        StrategySchema validates version (number), config_version (number), and parameters with nested groups; each
        numeric parameter has min/max bounds enforced by Zod .min()/.max() matching the ranges in ADR-023 Decision 2
      - >-
        ObservationRecordSchema validates: story_code (string), status (enum: done|blocked|failed), criteria_verified
        (string[]), criteria_failed (string[]), metrics (record of metric key to number), strategy_hash (string),
        board_hash (string), started_at (ISO datetime), completed_at (ISO datetime)
      - >-
        ClaimSchema validates all fields from ADR-023 Decision 5 including agent_id, type (enum), description,
        parameter_path (optional), new_value (optional), pm_commands (optional), claimed_at (ISO datetime), ttl_seconds
        (number), status (enum)
      - >-
        ExperimentResultSchema, HypothesisSchema, InsightSchema, and BestMetadataSchema each validate their respective
        structures from ADR-023 Decision 6
      - All schemas and inferred types re-exported from src/schemas/index.ts
      - >-
        Unit tests in src/schemas/__tests__/swarm-store.schema.test.ts verify valid payloads pass and invalid payloads
        (missing fields, out-of-range values, wrong enums) fail for each schema
    status: backlog
    priority: high
    story_points: 3
    depends_on: []
    notes: ''
  - id: S002
    code: PM-E057-S002
    title: Implement FileSwarmStore core CRUD
    description: >-
      Implement FileSwarmStore class in src/lib/swarm-store.ts providing the core CRUD methods: read(), write(), list(),
      delete(). Files are stored as YAML under .pm/swarm/<namespace>/. Each write validates against the appropriate Zod
      schema. Each read returns null if the file does not exist or fails validation (graceful degradation per ADR-023
      Decision 3).
    acceptance_criteria:
      - FileSwarmStore class implements read(namespace, key) returning parsed YAML or null for missing/invalid files
      - >-
        write(namespace, key, data) writes Zod-validated YAML to .pm/swarm/<namespace>/<key>.yaml, creating directories
        as needed
      - list(namespace) returns sorted array of keys (filenames without .yaml extension) from .pm/swarm/<namespace>/
      - delete(namespace, key) removes the file, no-op if file does not exist
      - All methods log warnings to stderr on corruption/parse errors instead of throwing (graceful degradation)
      - >-
        Unit tests cover: write then read round-trip, list with multiple files, delete existing and non-existing, read
        of corrupted YAML returns null
    status: backlog
    priority: high
    story_points: 5
    depends_on:
      - PM-E057-S001
    notes: ''
  - id: S003
    code: PM-E057-S003
    title: Implement FileSwarmStore search method
    description: >-
      Implement the search(namespace, query, threshold) method on FileSwarmStore using Levenshtein ratio over
      description fields. Pure TypeScript DP implementation, no external dependency.
    acceptance_criteria:
      - search() reads all YAML files in the namespace, extracts description field, computes Levenshtein ratio
      - Returns Array of key/score pairs filtered to scores >= threshold, sorted descending
      - Files without a description field are skipped without error
      - Levenshtein function is a pure TypeScript helper, exported for direct testing
      - >-
        Unit tests verify: exact match=1.0, similar strings expected ratios, unrelated below threshold, empty namespace
        returns empty
    status: backlog
    priority: medium
    story_points: 3
    depends_on:
      - PM-E057-S002
    notes: ''
  - id: S004
    code: PM-E057-S004
    title: Implement pm swarm init CLI command
    description: >-
      Add pm swarm init subcommand that creates .pm/swarm/ directory structure and copies default tactics and strategy
      templates.
    acceptance_criteria:
      - >-
        Running pm swarm init creates .pm/swarm/ with subdirectories: observations, results, claims, hypotheses,
        insights, best
      - .pm/swarm/tactics.yaml is copied from the default template at docs/templates/swarm-default-tactics.yaml
      - '.pm/swarm/strategy.yaml is created with default parameter values and config_version: 1'
      - If .pm/swarm/ already exists, prints warning and does not overwrite existing files
      - 'If .pm/ does not exist, fails with clear error: No project found. Run pm init first.'
      - The swarm subdirectory is NOT created by pm init -- it is opt-in via pm swarm init only
    status: backlog
    priority: high
    story_points: 3
    depends_on:
      - PM-E057-S002
    notes: ''
  - id: S005
    code: PM-E057-S005
    title: Register swarm subcommand group in CLI
    description: >-
      Register the pm swarm command group in src/cli.ts with the init subcommand. Follow existing pattern used by pm
      agent, pm adr, etc.
    acceptance_criteria:
      - pm swarm init is callable from the CLI and delegates to the init implementation
      - 'pm swarm --help lists all registered swarm subcommands (at minimum: init)'
      - Running pm swarm with no subcommand prints the help text
      - The swarm command group is registered in src/cli.ts following the existing Commander pattern
    status: backlog
    priority: high
    story_points: 2
    depends_on:
      - PM-E057-S004
    notes: ''
  - id: S006
    code: PM-E057-S006
    title: Add swarm MCP tools for read/write/list
    description: >-
      Register MCP tools in src/mcp-server.ts for swarm operations: pm_swarm_read, pm_swarm_write, pm_swarm_list. Follow
      existing MCP tool pattern.
    acceptance_criteria:
      - pm_swarm_read tool returns the YAML content for a given namespace/key, or a not found message
      - pm_swarm_write tool writes validated data to the swarm store and returns confirmation
      - pm_swarm_list tool returns the list of keys in a namespace
      - All three tools accept and require workdir parameter
      - Tools return graceful error messages (not stack traces) for invalid inputs or missing .pm/swarm/
      - Integration tests in src/__tests__/mcp-server.test.ts cover each tool happy path and error case
    status: backlog
    priority: medium
    story_points: 5
    depends_on:
      - PM-E057-S002
    notes: ''

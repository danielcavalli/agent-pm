id: E017
code: PM-E017
title: Global Slash Command Installation
description: >-
  Make all /pm-* slash commands globally available by copying them from .opencode/commands/ (project-local) to
  install/opencode/commands/ (install source) and then to ~/.config/opencode/commands/ (global target). Replace all npm
  run pm -- references with plain pm since the CLI is globally installed. Update install.sh to handle the copy.
status: done
priority: medium
created_at: '2026-03-10'
stories:
  - id: S001
    code: PM-E017-S001
    title: Copy all .opencode/commands/ to install/opencode/commands/
    description: >-
      Create the install/opencode/commands/ directory and copy all 10 slash command markdown files from
      .opencode/commands/. These will serve as the global installation source. The local .opencode/commands/ remain for
      development use within the repo.
    acceptance_criteria:
      - install/opencode/commands/ directory exists
      - All 10 slash command .md files are copied
      - Files are identical to .opencode/commands/ originals (before npm run pm replacement)
    status: done
    priority: high
    story_points: 1
    notes: ''
  - id: S002
    code: PM-E017-S002
    title: Replace all npm run pm -- references with plain pm in global commands
    description: >-
      In the install/opencode/commands/ copies, replace every occurrence of 'npm run pm --' or 'npm run pm -- ' with
      plain 'pm '. The global commands must use the globally-installed pm binary, not the local npm script. Keep the
      .opencode/commands/ local copies unchanged for dev use.
    acceptance_criteria:
      - All install/opencode/commands/*.md files use bare 'pm' not 'npm run pm --'
      - No remaining references to npm run pm in the install/ copies
      - Local .opencode/commands/ files remain unchanged
    status: done
    priority: high
    story_points: 2
    notes: ''
  - id: S003
    code: PM-E017-S003
    title: Update install.sh to copy commands to ~/.config/opencode/commands/
    description: >-
      Extend the install.sh script (created in PM-E015-S004) to copy all files from install/opencode/commands/ to
      ~/.config/opencode/commands/. Create the target directory if it does not exist. Handle the case where commands
      already exist (overwrite with latest version).
    acceptance_criteria:
      - install.sh copies all command .md files to ~/.config/opencode/commands/
      - Target directory is created if it does not exist
      - Existing commands are overwritten with the latest version
    status: done
    priority: high
    story_points: 2
    notes: ''
  - id: S004
    code: PM-E017-S004
    title: Verify commands do not conflict with existing global commands
    description: >-
      Check that the /pm-* command names do not conflict with any existing OpenCode global slash commands. List any
      commands in ~/.config/opencode/commands/ and verify no naming collisions. Document the full list of installed
      commands and their purposes.
    acceptance_criteria:
      - No naming conflicts with existing global slash commands
      - All 10 pm-* commands are verified to load correctly in OpenCode
      - A manifest of installed commands and their purposes is documented
    status: done
    priority: medium
    story_points: 1
    notes: ''

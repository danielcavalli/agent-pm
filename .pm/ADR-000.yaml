adrs:
  - id: ADR-001
    title: Use YAML for ADR storage
    status: accepted
    context: Need a human-readable format for architectural decisions
    decision: Store ADRs as YAML files in the project directory
    consequences:
      positive:
        - Human readable, easy to version control
      negative:
        - Less tooling support than JSON

name: CI

on:
  pull_request:

jobs:
  verify:
    name: Lint, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Run command surface drift gate
        run: npm run check:command-surface

      - name: Run tests
        run: npm test
